name: Build & deploy

on:
  push:
    branches: [main]
  # Refreshes the contribution graph and the auto-populated repo list without a commit.
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Pulls repos + the contribution calendar into src/data/github.json.
      # GH_PAT needs `read:user`; without it the script falls back to a public proxy.
      - name: Sync GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: npm run sync:github

      - name: Build
        env:
          PUBLIC_UMAMI_HOST: ${{ secrets.PUBLIC_UMAMI_HOST }}
          PUBLIC_UMAMI_ID: ${{ secrets.PUBLIC_UMAMI_ID }}
        run: npm run build

      # Fails the build rather than shipping the dead links the old site had.
      - name: Check links
        run: npm run check:links

      - name: Deploy to VPS
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
