# Coolify builds and deploys on every push, so nothing here builds or ships anything.
#
# The one thing a push-triggered deploy cannot do is keep the page fresh while Dax is not
# committing: the contribution graph and the repo list come from the GitHub API, and
# `npm run build` pulls them in via `sync:github` at build time. Without a nudge, they would
# freeze at whatever the last deploy saw.
#
# So this rings Coolify's doorbell once a day and lets it rebuild with today's data.
#
# Repository secrets:
#   COOLIFY_WEBHOOK  the app's deploy webhook (Coolify → the app → Configuration → Webhooks)
#   COOLIFY_TOKEN    an API token with the "deploy" permission (Coolify → Keys & Tokens)
#
# Note: GitHub suspends scheduled workflows after 60 days without repo activity. If the site
# ever goes quiet for two months, re-enable it here or move the cron onto one of the servers.
name: Refresh site data

on:
  schedule:
    # 06:17 UTC — an odd minute, because everything on the hour contends with everyone else.
    - cron: '17 6 * * *'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger a Coolify deploy
        run: |
          curl --fail --silent --show-error --request GET \
            "${{ secrets.COOLIFY_WEBHOOK }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
